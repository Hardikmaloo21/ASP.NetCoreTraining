# File: WMS.DevOps/azure-pipelines.yml
# WMS CI/CD Pipeline - Build + Test + Artifact Publish
# No Azure subscription required for these stages

trigger:
  branches:
    include:
      - main
      - dev

pr:
  branches:
    include:
      - main

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '8.x'
  nodeVersion: '20.x'

stages:

# ─────────────────────────────────────────────
# STAGE 1: Build and Test .NET API
# ─────────────────────────────────────────────
- stage: BuildBackend
  displayName: 'Stage 1 - Build and Test .NET API'
  jobs:
  - job: DotNetBuild
    displayName: 'Restore → Build → Test → Publish'
    pool:
      vmImage: 'windows-latest'
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Step 1 - Restore NuGet Packages'
      inputs:
        command: 'restore'
        projects: 'WMS-Solution/**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Step 2 - Build Solution'
      inputs:
        command: 'build'
        projects: 'WMS-Solution/**/*.csproj'
        arguments: '--configuration $(buildConfiguration) --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Step 3 - Run Unit Tests'
      inputs:
        command: 'test'
        projects: 'WMS-Solution/**/WMS.Tests/*.csproj'
        arguments: '--configuration $(buildConfiguration) --logger trx'
        publishTestResults: true
      continueOnError: true

    - task: DotNetCoreCLI@2
      displayName: 'Step 4 - Publish API'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'WMS-Solution/WMS.API/WMS.API.csproj'
        arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api'
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      displayName: 'Step 5 - Upload API Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/api'
        ArtifactName: 'wms-api'
        publishLocation: 'Container'

# ─────────────────────────────────────────────
# STAGE 2: Build Angular Frontend
# ─────────────────────────────────────────────
- stage: BuildFrontend
  displayName: 'Stage 2 - Build Angular Frontend'
  dependsOn: []
  jobs:
  - job: AngularBuild
    displayName: 'npm install → ng build production'
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: $(nodeVersion)

    - script: |
        cd WMS-Solution/frontend/wms-frontend
        npm install --legacy-peer-deps --no-audit --no-fund
      displayName: 'Step 1 - Install dependencies (low memory)'

    - script: |
        cd WMS-Solution/frontend/wms-frontend
        export NODE_OPTIONS="--max-old-space-size=1536"
        npx ng build --configuration production
      displayName: 'Step 2 - ng build production (low memory)'

    - task: PublishBuildArtifacts@1
      displayName: 'Step 3 - Upload Frontend Artifact'
      inputs:
        PathtoPublish: 'WMS-Solution/frontend/wms-frontend/dist/wms-frontend/browser'
        ArtifactName: 'wms-frontend'
        publishLocation: 'Container'

# ─────────────────────────────────────────────
# STAGE 3: Test Automation with Coverage
# ─────────────────────────────────────────────
- stage: TestAutomation
  displayName: 'Stage 3 - Test Automation'
  dependsOn: BuildBackend
  jobs:
  - job: RunTests
    displayName: 'Run Tests with Code Coverage'
    pool:
      vmImage: 'windows-latest'
    steps:

    - task: UseDotNet@2
      displayName: 'Install .NET 8 SDK'
      inputs:
        version: $(dotnetVersion)

    - task: DotNetCoreCLI@2
      displayName: 'Run All Tests with Coverage'
      inputs:
        command: 'test'
        projects: 'WMS-Solution/**/WMS.Tests/*.csproj'
        arguments: '--collect:"XPlat Code Coverage" --logger trx'
        publishTestResults: true
      continueOnError: true

    - task: PublishCodeCoverageResults@1
      displayName: 'Publish Code Coverage Report'
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'
      condition: succeededOrFailed()

# ─────────────────────────────────────────────
# STAGE 4: Deployment Ready Summary
# ─────────────────────────────────────────────
- stage: DeploymentApproval
  displayName: 'Stage 4 - Deployment Approval'
  dependsOn:
    - BuildBackend
    - BuildFrontend
    - TestAutomation
  condition: succeeded()
  jobs:
  - job: Summary
    displayName: 'Pipeline Summary'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - script: |
        echo "============================================"
        echo "   WMS CI/CD PIPELINE - ALL STAGES PASSED"
        echo "============================================"
        echo ""
        echo "  Stage 1 - Backend Build   : SUCCESS"
        echo "  Stage 2 - Frontend Build  : SUCCESS"
        echo "  Stage 3 - Unit Tests      : SUCCESS"
        echo "  Stage 4 - Artifacts       : PUBLISHED"
        echo ""
        echo "  Next Step: Deploy to Azure"
        echo "  API     -> Azure App Service"
        echo "  Angular -> Azure Static Web Apps"
        echo "============================================"
        echo "  Project  : WMS - Capgemini Sprint"
        echo "  Branch   : $(Build.SourceBranchName)"
        echo "  Build ID : $(Build.BuildId)"
        echo "  Date     : $(date)"
        echo "============================================"
      displayName: 'Show Deployment Summary'