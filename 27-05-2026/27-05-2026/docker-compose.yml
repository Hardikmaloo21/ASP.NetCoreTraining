services:
  db:
    image: postgres:16-alpine
    container_name: hrms-db
    environment:
      POSTGRES_DB: hrms_db
      POSTGRES_USER: hrms_user
      POSTGRES_PASSWORD: hrms_secure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrms_user -d hrms_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrms-network

  cache:
    image: redis:7-alpine
    container_name: hrms-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hrms-network

  messaging:
    image: rabbitmq:3-management-alpine
    container_name: hrms-messaging
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - hrms-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrms-backend-api
    ports:
      - "5000:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=db;Database=hrms_db;Username=hrms_user;Password=hrms_secure_password
      - Redis__ConnectionString=cache:6379
      - RabbitMQ__HostName=messaging
      - JWT__Key=super_secret_key_hrms_platform_1234567890
      - JWT__Issuer=HRMS_API
      - JWT__Audience=HRMS_Client
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      messaging:
        condition: service_started
    networks:
      - hrms-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hrms-frontend-ui
    ports:
      - "80:80"
      - "4200:4200"
    depends_on:
      - backend
    networks:
      - hrms-network

networks:
  hrms-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
