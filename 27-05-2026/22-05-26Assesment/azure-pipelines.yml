trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release

stages:
  - stage: Build
    jobs:
      - job: Api
        steps:
          - task: UseDotNet@2
            inputs:
              packageType: sdk
              version: 8.0.x
          - script: dotnet restore src/Hospital.Api/Hospital.Api.csproj
            displayName: Restore API
          - script: dotnet build src/Hospital.Api/Hospital.Api.csproj --configuration $(buildConfiguration) --no-restore
            displayName: Build API
          - script: dotnet publish src/Hospital.Api/Hospital.Api.csproj --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api --no-build
            displayName: Publish API
          - publish: $(Build.ArtifactStagingDirectory)/api
            artifact: api

      - job: Web
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: 22.x
          - script: npm install
            workingDirectory: web
            displayName: Install web dependencies
          - script: npm run build
            workingDirectory: web
            displayName: Build web
          - publish: web/dist
            artifact: web

  - stage: Deploy
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: AzureDeployment
        environment: hospital-platform-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Deploy API to Azure App Service or AKS, web to Azure Static Web Apps, and secrets to Key Vault."
                  displayName: Deployment placeholder
