version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: logitrack_postgres
    environment:
      POSTGRES_DB: LogiTrackDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: logitrack_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: logitrack_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logitrack_api
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=LogiTrackDb;Username=postgres;Password=postgres"
      Kafka__BootstrapServers: "kafka:9092"
      ASPNETCORE_ENVIRONMENT: Development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logitrack_frontend
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data:
