<div class="container">
  <h2>Doctor Appointment System</h2>

  <form #form="ngForm" (ngSubmit)="submitForm()">

    <!-- Patient Name -->
    <label>Patient Name</label>
    <input type="text" [(ngModel)]="patientName" name="patientName" required />

    <!-- Doctor Selection -->
    <label>Doctor</label>
    <select [(ngModel)]="doctor" name="doctor" required>
      <option value="">Select Doctor</option>
      <option *ngFor="let doc of doctors" [value]="doc">{{ doc }}</option>
    </select>

    <!-- Date -->
    <label>Appointment Date</label>
    <input type="date"
           [(ngModel)]="appointmentDate"
           name="appointmentDate"
           [min]="today"
           required />

    <!-- Consultation Type -->
    <label>Consultation Type</label>
    <select [(ngModel)]="consultationType"
            name="consultationType"
            (change)="updateFee()"
            required>
      <option value="">Select Type</option>
      <option value="Online">Online</option>
      <option value="Offline">Offline</option>
    </select>

    <!-- Symptoms -->
    <label>Symptoms</label>
    <textarea [(ngModel)]="symptoms" name="symptoms"></textarea>

    <button type="submit">Book Appointment</button>
  </form>

  <!-- Live Summary -->
  <div class="summary" *ngIf="patientName || doctor || appointmentDate">
    <h3>Appointment Summary</h3>
    <p><b>Name:</b> {{ patientName }}</p>
    <p><b>Doctor:</b> {{ doctor }}</p>
    <p><b>Date:</b> {{ appointmentDate }}</p>
    <p><b>Type:</b> {{ consultationType }}</p>
    <p><b>Fee:</b> ₹{{ fee }}</p>
    <p><b>Symptoms:</b> {{ symptoms }}</p>
  </div>

  <!-- Confirmation -->
  <div class="confirmation" *ngIf="submitted">
    <h3>Appointment Booked Successfully!</h3>
  </div>
</div>
