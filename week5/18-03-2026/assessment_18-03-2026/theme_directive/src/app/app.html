<!-- 👇 Directive apply on whole page -->
<div [appTheme]="theme" class="container">

  <h2> Theme Directive</h2>

  <button (click)="toggleTheme()">
    Switch to {{ theme === 'light' ? 'Dark' : 'Light' }} Mode
  </button>

  <p>
    Current Theme: {{ theme }}
  </p>

  <div class="card">
    <p>This is a sample content card.</p>
  </div>

</div>
