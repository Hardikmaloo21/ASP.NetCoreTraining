<h2> Role-Based Dashboard</h2>

<!-- 👇 Role Change UI -->
<label>Select Role: </label>

<select [(ngModel)]="userRole">
  <option value="admin">Admin</option>
  <option value="user">User</option>
</select>

<p>Current Role: {{ userRole }}</p>

<hr>

<!-- 👇 Only visible for admin -->
<button *appRole="userRole">
  Delete User
</button>

<p *appRole="userRole">
  This content is visible only to ADMIN
</p>

<!-- Always visible -->
<p>Common content (visible to all)</p>
