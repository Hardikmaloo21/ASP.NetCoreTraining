<h2> Student Status Dashboard</h2>

<div class="container">

  <div *ngFor="let s of students" class="card">

    <h3>{{ s.name }}</h3>
    <p>Marks: {{ s.marks }}</p>

    <!-- 👇 Directive yahan use hoga -->
    <p [appStatusColor]="s.marks">
      {{ s.marks >= 50 ? 'Pass' : 'Fail' }}
    </p>

  </div>

</div>
