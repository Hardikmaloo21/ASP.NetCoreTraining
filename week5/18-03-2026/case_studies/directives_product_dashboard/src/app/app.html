<h2>Product Dashboard</h2>

<button (click)="showProducts = !showProducts">
  Toggle Products
</button>

<div *ngIf="showProducts">
    <div *ngFor="let p of products" class="card">
      <h3>{{p.name}}</h3>
      <p [ngClass] = "{
        'high-price' : p.price > 30000,
        'low-price' : p.price <= 30000
    }">
      Price: ${{p.price}}
  </p>
    <div [ngSwitch] = "p.status">
      <p *ngSwitchCase="'Available'"> In Stock </p>
      <p *ngSwitchCase="'Out'"> Out of Stock</p>
      <p *ngSwitchCase="'Limited'"> Limited Stock </p>
      <p *ngSwitchDefault> Unknown </p>
    </div>

    <p [ngStyle] = "{
      'color' : p.status === 'available' ? 'green' : 'red',
      'font-weight' : 'bold'
    }">
      Status: {{p.status}}
    </p>

    </div>
</div>
